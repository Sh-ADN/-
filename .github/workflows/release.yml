name: Build & Release APK

# Runs every time AI Studio (or you) pushes to main.
# Also runnable manually from the Actions tab.
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

# Needed so the workflow is allowed to create a Release.
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 9.3.1

      - name: Decode debug keystore
        run: base64 -d debug.keystore.base64 > debug.keystore

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Set build tag
        id: vars
        run: echo "tag=build-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: "সমাগত খেরোখাতা – build ${{ github.run_number }}"
          make_latest: true
          # If your AI Studio project's module isn't named "app",
          # update this path to match (check settings.gradle).
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

